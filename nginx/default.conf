server {
    listen 80;
    server_name localhost;

    root /var/www/public;
    index index.php index.html index.htm;

    # Sembunyikan versi Nginx dari response header
    server_tokens off;

    # ── Security Headers ────────────────────────────────────────────────────────
    # Cegah halaman ditampilkan di iframe situs lain (anti-clickjacking)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Cegah browser menebak tipe konten (anti-MIME sniffing)
    add_header X-Content-Type-Options "nosniff" always;
    # Aktifkan proteksi XSS bawaan browser lama
    add_header X-XSS-Protection "1; mode=block" always;
    # Batasi informasi referrer ke situs lain
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Nonaktifkan fitur browser yang tidak diperlukan
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # ────────────────────────────────────────────────────────────────────────────

    # Rate limiting: batasi request ke endpoint login (anti brute-force dari layer Nginx)
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Terapkan rate limit khusus untuk endpoint login
    location = /login {
        limit_req zone=login_zone burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        # Sembunyikan informasi PHP dari response
        fastcgi_hide_header X-Powered-By;
    }

    # Blokir akses ke file .htaccess dan file tersembunyi lainnya
    location ~ /\. {
        deny all;
    }

    # Blokir akses langsung ke file sensitif
    location ~* \.(env|log|sh|sql|bak|backup)$ {
        deny all;
        return 404;
    }
}
