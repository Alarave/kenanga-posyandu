version: '3.7'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: posyandu_app
    volumes:
      - .:/var/www
    ports:
      - "8585:8080"
    depends_on:
      - db
      - redis

  db:
    image: postgres:latest
    container_name: posyandu_db
    environment:
      POSTGRES_DB: posyandu
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: posyandu_redis
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:latest
    container_name: posyandu_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www
    ports:
      - "85:80"
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
